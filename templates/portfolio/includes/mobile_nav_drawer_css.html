<style>
/* ========================================
   Mobile Navigation Drawer - Shared CSS
   DRY: Include this in all templates
   ======================================== */

/* Mobile Nav Overlay */
.mobile-nav-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 9998;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
    pointer-events: none;
    display: none; /* Hidden on desktop */
}

.mobile-nav-overlay.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
}

/* Mobile Nav Drawer */
.mobile-nav-drawer {
    position: fixed;
    top: 0;
    left: 0;
    width: 280px;
    max-width: 85vw;
    height: 100%;
    height: 100vh;
    height: 100dvh;
    background: #ffffff;
    z-index: 9999;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 4px 0 24px rgba(0, 0, 0, 0.15);
    overflow-y: auto;
    display: none; /* Hidden on desktop */
}

.mobile-nav-drawer.active {
    transform: translateX(0);
}

/* Mobile Nav Header */
.mobile-nav-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px;
    border-bottom: 1px solid #f0f0f0;
    background: #fafafa;
}

.mobile-nav-profile {
    display: flex;
    align-items: center;
    gap: 12px;
}

.mobile-nav-avatar {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
}

.mobile-nav-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.mobile-nav-avatar-placeholder {
    width: 100%;
    height: 100%;
    background: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 20px;
}

.mobile-nav-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
}

.mobile-nav-name {
    font-weight: 600;
    font-size: 14px;
    color: #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.mobile-nav-title {
    font-size: 12px;
    color: #666;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.mobile-nav-close {
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    color: #666;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    transition: background-color 0.2s, color 0.2s;
}

.mobile-nav-close:hover {
    background-color: #f0f0f0;
    color: #333;
}

/* Mobile Nav Links */
.mobile-nav-links {
    padding: 16px 0;
}

.mobile-nav-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    color: #333;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: background-color 0.2s, color 0.2s;
    min-height: 44px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
}

.mobile-nav-link i {
    width: 20px;
    text-align: center;
    color: #666;
    font-size: 16px;
}

.mobile-nav-link:hover {
    background-color: #f5f5f5;
    color: #0085ff;
    text-decoration: none;
}

.mobile-nav-link:hover i {
    color: #0085ff;
}

.mobile-nav-link.active {
    background-color: #f0f7ff;
    color: #0085ff;
}

.mobile-nav-link.active i {
    color: #0085ff;
}

.mobile-nav-contact-btn {
    color: #0085ff;
    font-weight: 600;
    margin-top: 8px;
    border-top: 1px solid #f0f0f0;
    padding-top: 22px;
}

/* Mobile responsive - enable drawer on mobile */
@media (max-width: 991px) {
    .mobile-nav-overlay,
    .mobile-nav-drawer {
        display: block !important; /* Force visible on mobile - override any conflicting styles */
    }

    .mobile-nav-overlay:not(.active) {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .mobile-nav-drawer:not(.active) {
        transform: translateX(-100%); /* Keep hidden off-screen when inactive */
    }

    .mobile-nav-drawer.active {
        transform: translateX(0) !important; /* Force slide in when active */
    }
}
</style>
